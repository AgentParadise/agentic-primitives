# =============================================================================
# Build Workspace Images — Build, Sign, Publish to GHCR
# =============================================================================
#
# Trigger: Push to main (build + push), PRs (build only), manual dispatch.
#
# Pipeline:
#   1. Stage build context via build-provider.py
#   2. Build multi-arch container images
#   3. Push to GHCR with version tags
#   4. Sign with cosign (keyless OIDC)
#
# Security:
#   - All actions SHA-pinned
#   - cosign keyless signing (Sigstore OIDC)
#   - SBOM generated by BuildKit
# =============================================================================

name: Build Workspace Images

on:
  push:
    branches: [main]
    paths:
      - "providers/workspaces/**"
      - "plugins/**"
      - "lib/python/**"
      - "scripts/build-provider.py"
  pull_request:
    paths:
      - "providers/workspaces/**"
      - "plugins/**"
      - "lib/python/**"
      - "scripts/build-provider.py"
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag override (e.g. v1.1.0). Defaults to version from manifest."
        required: false
      dry_run:
        description: "Dry run — build but don't push or sign"
        type: boolean
        default: false

concurrency:
  group: build-workspace-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: agentparadise

jobs:
  build-push:
    name: "Build: ${{ matrix.provider }}"
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: read
      packages: write
      id-token: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - provider: claude-cli
            image: agentic-workspace-claude-cli
            platforms: linux/amd64,linux/arm64
          - provider: interactive-tmux
            image: agentic-workspace-interactive-tmux
            platforms: linux/amd64,linux/arm64

    steps:
      # -------------------------------------------------------------------
      # Checkout
      # -------------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4
        with:
          fetch-depth: 0

      # -------------------------------------------------------------------
      # Python + uv (for build-provider.py staging)
      # -------------------------------------------------------------------
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v6
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      # -------------------------------------------------------------------
      # Stage build context
      # -------------------------------------------------------------------
      - name: Stage build context
        run: uv run scripts/build-provider.py ${{ matrix.provider }} --stage-only

      # -------------------------------------------------------------------
      # Determine version + tags
      # -------------------------------------------------------------------
      - name: Determine version
        id: version
        run: |
          # Provider manifest version
          MANIFEST_VERSION=$(grep '^version:' providers/workspaces/${{ matrix.provider }}/manifest.yaml | awk '{print $2}' | tr -d '"')
          # CLI version from staged Dockerfile
          CLI_VERSION=$(grep 'ARG CLAUDE_CLI_VERSION=' build/${{ matrix.provider }}/Dockerfile | cut -d= -f2)
          # Tag override from input
          TAG_OVERRIDE="${{ inputs.tag }}"

          if [[ -n "$TAG_OVERRIDE" ]]; then
            VERSION="${TAG_OVERRIDE#v}"
          else
            VERSION="${MANIFEST_VERSION}"
          fi

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "cli_version=${CLI_VERSION}" >> "$GITHUB_OUTPUT"
          echo "manifest_version=${MANIFEST_VERSION}" >> "$GITHUB_OUTPUT"

          # Determine if this is a push to main (publish) or PR (build-only)
          if [[ "${{ github.event_name }}" == "push" && "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "should_push=true" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.dry_run }}" != "true" ]]; then
            echo "should_push=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_push=false" >> "$GITHUB_OUTPUT"
          fi

      # -------------------------------------------------------------------
      # Docker Buildx + QEMU
      # -------------------------------------------------------------------
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Set up QEMU
        if: contains(matrix.platforms, 'arm64')
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4
        with:
          platforms: ${{ matrix.platforms }}

      # -------------------------------------------------------------------
      # GHCR login
      # -------------------------------------------------------------------
      - name: Log in to GHCR
        if: steps.version.outputs.should_push == 'true'
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # -------------------------------------------------------------------
      # Docker metadata (tags + labels)
      # -------------------------------------------------------------------
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ matrix.image }}
          tags: |
            # Manifest version: 1.1.0
            type=raw,value=${{ steps.version.outputs.version }}
            # CLI version: 2.1.76
            type=raw,value=${{ steps.version.outputs.cli_version }}
            # Latest (only on push to main)
            type=raw,value=latest,enable=${{ steps.version.outputs.should_push == 'true' }}
            # Git SHA (always)
            type=sha,prefix=
          labels: |
            org.opencontainers.image.title=${{ matrix.image }}
            org.opencontainers.image.description=Agentic Workspace - ${{ matrix.provider }} provider
            org.opencontainers.image.vendor=AgentParadise
            org.opencontainers.image.source=https://github.com/AgentParadise/agentic-primitives
            agentic.provider=${{ matrix.provider }}
            agentic.provider.version=${{ steps.version.outputs.manifest_version }}
            agentic.cli.version=${{ steps.version.outputs.cli_version }}

      # -------------------------------------------------------------------
      # Build + Push
      # -------------------------------------------------------------------
      - name: Build and push image
        id: push
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        with:
          context: build/${{ matrix.provider }}
          file: build/${{ matrix.provider }}/Dockerfile
          platforms: ${{ matrix.platforms }}
          push: ${{ steps.version.outputs.should_push == 'true' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true

      # -------------------------------------------------------------------
      # Sign with cosign (keyless OIDC)
      # -------------------------------------------------------------------
      - name: Install cosign
        if: steps.version.outputs.should_push == 'true'
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign image with cosign
        if: steps.version.outputs.should_push == 'true'
        env:
          DIGEST: ${{ steps.push.outputs.digest }}
          COSIGN_YES: "true"
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ matrix.image }}"
          echo "Signing ${IMAGE}@${DIGEST}"
          cosign sign "${IMAGE}@${DIGEST}"

      # -------------------------------------------------------------------
      # Summary
      # -------------------------------------------------------------------
      - name: Write build summary
        run: |
          echo "## Workspace Image: ${{ matrix.image }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Field | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Provider | \`${{ matrix.provider }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Manifest Version | \`${{ steps.version.outputs.manifest_version }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| CLI Version | \`${{ steps.version.outputs.cli_version }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Platforms | \`${{ matrix.platforms }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Pushed | \`${{ steps.version.outputs.should_push }}\` |" >> "$GITHUB_STEP_SUMMARY"
          if [[ "${{ steps.version.outputs.should_push }}" == "true" ]]; then
            echo "| Digest | \`${{ steps.push.outputs.digest }}\` |" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "### Verify" >> "$GITHUB_STEP_SUMMARY"
            echo '```bash' >> "$GITHUB_STEP_SUMMARY"
            echo "cosign verify ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ matrix.image }}@${{ steps.push.outputs.digest }}" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          fi
