# Interactive-tmux Workspace Provider Manifest
#
# Bundles claude, codex, and gemini interactive CLIs plus tmux in a
# single image. Driven from the host via `docker exec tmux send-keys` /
# `tmux capture-pane`. See EXP-05 for the design and EXP-01..04 for the
# transport validation that made this provider possible.
#
# Build:
#   uv run scripts/build-provider.py interactive-tmux
#   just build-provider interactive-tmux
#
# See ADR-027: Provider-Based Workspace Images

name: interactive-tmux
version: "0.1.0"
description: Interactive multi-agent (claude/codex/gemini) workspace driven over tmux from the host

# Image build configuration
image:
  dockerfile: ./Dockerfile
  tag: agentic-workspace-interactive-tmux
  # Build context is the agentic-primitives root (matches claude-cli convention)
  context: ../../..
  args: {}

# Runtime configuration
runtime:
  # No single agent binary — this image hosts three interactive CLIs side
  # by side, addressed by tmux pane name from the host driver.
  agent: tmux-multi
  modes:
    - interactive
  # OTel is NOT native to this provider — the interactive CLIs do not
  # emit the stream-json events the claude-cli `-p` mode produces. Event
  # capture for the interactive transport is future work (see EXP-05
  # follow-ups).
  otel_native: false

# Plugin configuration (ADR-033)
# Observability is baked because the interactive Claude TUI does not surface
# hook stdout/stderr reliably. The hook handler writes to AGENTIC_EVENTS_JSONL,
# and the host driver drains that sink into normalized AgentRunEvent fanout.
plugins:
  include:
    - observability
  install_path: /opt/agentic/plugins

# Default tool configuration. Mirrors the claude-cli provider's defaults
# so the same allow/require sets work without surprise for callers that
# share configuration shape across providers.
defaults:
  allowed_tools:
    - Read
    - Write
    - Edit
    - MultiEdit
    - Bash
    - Glob
    - Grep
    - LS
    - Task
    - TodoRead
    - TodoWrite
    - WebFetch
    - WebSearch
  require_enablement:
    - mcp__*
    - computer
  otel_enabled: false

# Security configuration
security:
  non_root: true
  user: agent
  uid: 1000
  gid: 1000
  no_setuid: true
  read_only_paths:
    - /opt/agentic
  network:
    enabled: true
    allowed_hosts: []

# Capabilities: this image's distinguishing feature is hosting three CLI
# agents addressable independently via tmux panes.
capabilities:
  cli_agents:
    - name: claude
      binary: claude
      tmux_window: claude
      auth_mounts:
        - host: ~/.claude
          container: /home/agent/.claude
          note: provides .credentials.json with claudeAiOauth.accessToken (Max plan)
        - host: ~/.claude.json
          container: /home/agent/.claude.json
          note: provides oauthAccount metadata + onboarding markers (avoids API-billing fallback and wizard)
    - name: codex
      binary: codex
      tmux_window: codex
      launch_args: ["--no-alt-screen"]
      auth_mounts:
        - host: ~/.codex
          container: /home/agent/.codex
    - name: gemini
      binary: gemini
      tmux_window: gemini
      auth_mounts:
        - host: ~/.gemini
          container: /home/agent/.gemini
          note: driver pre-patches settings.json security.folderTrust.enabled to false
  runtimes:
    - name: node
      version: "22"
    - name: python
      version: "3"
    - name: tmux
      version: ">=3.3"

# Health check
health:
  interval: 30s
  timeout: 3s
  start_period: 5s
  retries: 2

labels:
  org.opencontainers.image.title: "Agentic Workspace — Interactive tmux (claude/codex/gemini)"
  org.opencontainers.image.description: "Interactive multi-agent workspace driven from host over tmux"
  org.opencontainers.image.vendor: "Agentic Primitives"
  org.opencontainers.image.source: "https://github.com/agentparadise/agentic-primitives"
