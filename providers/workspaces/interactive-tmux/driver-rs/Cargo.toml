[package]
name = "itmux"
version = "0.1.0"
edition = "2021"
rust-version = "1.74"
description = "Rust port of the interactive-tmux workspace driver (Python parity)."
license = "MIT OR Apache-2.0"
publish = false

[[bin]]
name = "itmux"
path = "src/main.rs"

[lib]
name = "itmux"
path = "src/lib.rs"

[dependencies]
clap = { version = "4", features = ["derive"] }
regex = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"

[profile.release]
lto = "thin"
codegen-units = 1
strip = true
panic = "abort"

[lints.rust]
unsafe_code = "forbid"

[lints.clippy]
all = { level = "warn", priority = -1 }
