[package]
name = "itmux"
version = "0.1.0"
edition = "2021"
rust-version = "1.74"
description = "Rust port of the interactive-tmux workspace driver (Python parity)."
license = "MIT OR Apache-2.0"
publish = false

[[bin]]
name = "itmux"
path = "src/main.rs"

[lib]
name = "itmux"
path = "src/lib.rs"

[dependencies]
# TODO(#245): switch to the git-pinned dep once EXP-0005 merges to APSS main.
# The git-pinned form (below) is fetchable but does NOT build at rev
# 4819b38: the APSS repo workspace includes template skeletons whose package
# name is the literal `{{slug}}`, which cargo rejects when resolving the
# git-source workspace, leaving `agent_recipe` unlinked. The local worktree's
# workspace has an explicit `members` list that excludes those templates, so
# the path dep builds cleanly. Both point at the SAME crate + rev content.
#   agent_recipe = { git = "https://github.com/AgentParadise/agent-paradise-standards-system", rev = "4819b38745aaf8d2742d74479a9e728283e09271", package = "apss-v1-0005-agent-recipe" }
agent_recipe = { path = "/Users/neural/Code/AgentParadise/agent-paradise-standards-system_worktrees/20260707_recipe-directory/standards-experimental/v1/EXP-V1-0005-agent-recipe", package = "apss-v1-0005-agent-recipe" }
clap = { version = "4", features = ["derive"] }
regex = "1"
schemars = "0.8"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
# Signal handling for `itmux run` two-tier cancellation. Required because the
# crate forbids `unsafe` (`unsafe_code = "forbid"`) and std has no safe API to
# install a SIGINT/SIGTERM handler - a raw `sigaction` needs `unsafe`.
# signal-hook encapsulates that FFI and exposes a safe, async-signal-safe
# self-pipe `Signals` iterator we drive from a normal watcher thread. Minimal,
# widely-used, unix-only (matching this docker/tmux host-side driver).
[target.'cfg(unix)'.dependencies]
signal-hook = "0.3"

[profile.release]
lto = "thin"
codegen-units = 1
strip = true
panic = "abort"

[lints.rust]
unsafe_code = "forbid"

[lints.clippy]
all = { level = "warn", priority = -1 }
