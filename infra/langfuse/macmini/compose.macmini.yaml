# Mac mini production overlay for LangFuse's upstream docker-compose.yml.
#
# Applied alongside the pinned upstream compose file by macmini.sh. LangFuse
# stays loopback-only; Tailscale Serve is the sole tailnet ingress.
services:
  langfuse-web:
    ports: !override
      - "127.0.0.1:3000:3000"

  langfuse-worker:
    ports: !reset []

  clickhouse:
    ports: !reset []

  minio:
    ports: !reset []

  redis:
    ports: !reset []

  postgres:
    ports: !reset []
